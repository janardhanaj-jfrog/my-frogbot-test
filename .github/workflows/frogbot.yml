name: "Frogbot General Scan"

on:
  push:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:

  # ── Scan repository on push to main branch test the usecase ───────────────────────────────────────
  frogbot-scan-repository:
    runs-on: ubuntu-latest
    environment: frogbot
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4          # ← ADD THIS

      - name: Run Frogbot Scan Repository
        uses: jfrog/frogbot@v3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN2 }}
          JF_WORKING_DIR: "npm-example"
          JF_WATCHES: "demo-all-repos-watch"
          JFROG_CLI_LOG_LEVEL: DEBUG
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"

  # ── Scan pull requests ─────────────────────────────────────────────────────
  frogbot-scan-pull-request:
    runs-on: ubuntu-latest
    environment: frogbot
    if: github.event_name == 'pull_request_target'
    steps:
      - uses: actions/checkout@v4          # ← ADD THIS
        with:
          ref: ${{ github.event.pull_request.base.ref }}   # ← base branch only, NOT head

      - name: Run Frogbot Scan Pull Request
        uses: jfrog/frogbot@v3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN2 }}
          JF_WORKING_DIR: "npm-example"
          JF_WATCHES: "demo-all-repos-watch"
          JF_GIT_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          JFROG_CLI_LOG_LEVEL: DEBUG
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"
