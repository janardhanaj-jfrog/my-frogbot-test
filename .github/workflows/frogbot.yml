name: "Frogbot General Scan"

on:
  push:
    branches: ["main"]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:

  # ── Job 1: Runs on push to main (full repo scan) ──────────────────────────
  frogbot-scan-repository:
    runs-on: ubuntu-latest
    environment: frogbot
    if: github.event_name == 'push'
    steps:
      - name: Run Frogbot Scan Repository
        uses: jfrog/frogbot@v3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN2 }}
          JF_WORKING_DIR: "npm-example"
          JF_WATCHES: "demo-all-repos-watch"
          JFROG_CLI_LOG_LEVEL: DEBUG
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"

  # ── Job 2: Runs on PRs (scans the PR diff) ────────────────────────────────
  frogbot-scan-pull-request:
    runs-on: ubuntu-latest
    environment: frogbot
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Run Frogbot Scan Pull Request
        uses: jfrog/frogbot@v3
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN2 }}
          JF_WORKING_DIR: "npm-example"
          JF_WATCHES: "demo-all-repos-watch"
          JF_GIT_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          JFROG_CLI_LOG_LEVEL: DEBUG
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"
